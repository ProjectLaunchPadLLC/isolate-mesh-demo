<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Isolate Mesh Dashboard</title>
  <style>body{font-family:system-ui,Segoe UI,Roboto,Arial;margin:40px}</style>
</head>
<body>
  <h1>Isolate Mesh Dashboard</h1>
  <p id="status">Loading status...</p>
  <script>
    async function loadStatus(){
      try {
        const res = await fetch('/.netlify/functions/status-proxy' /* Pages will proxy to control-plane route or use direct URL */);
        const json = await res.json();
        document.getElementById('status').innerText = JSON.stringify(json, null, 2);
      } catch (e) {
        document.getElementById('status').innerText = 'Unable to fetch status: ' + e;
      }
    }
    loadStatus();
  </script>
</body>
</html>
